<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="stylesheet" href="./style.css" />
  <link rel="icon" href="./img/SENAS.png" type="image/png" />
</head>
<body>
  <section class="capa" id="home">
    <div class="slideshow">
      <img src="img/slide1.jpg" alt="" />
      <img src="img/slide2.jpg" alt="" />
      <img src="img/slide3.jpg" alt="" />
      <img src="img/slide4.jpg" alt="" />
      <img src="img/slide1.jpg" alt="" />
      <img src="img/slide2.jpg" alt="" />
      <img src="img/slide3.jpg" alt="" />
      <img src="img/slide4.jpg" alt="" />
    </div>
    <header>
      <nav>
        <div class="top">
          <a href="https://ead.sp.senai.br/" class="Ead.senai">
            <span class="logo"><img src="./img/senai-logo.webp" alt="SENAI" width="150px" /></span>
          </a>
          <div class="divider"></div>
          <h1>SERVIÇO NACIONAL DE<br />APRENDIZAGEM INDUSTRIAL</h1>
        </div>
      </nav>
    </header>
    <main>
      <div class="card-login">
        <div class="card-content">
          <p class="welcome">Portal Digital</p>
          <h1>INICIO DE SESSÃO NO PORTAL - SESI SP</h1>
          <p class="description">Informe seus dados para acessar o portal.</p>
          <div class="card-divider"></div>
          <div class="login-box">
            <form>
              <label for="ddlTipoLogin">Tipo de identificação</label>
              <div class="select-area">
                <select name="Tipo de Login" id="login-user" class="form-box">
                  <option value="CPF">CPF</option>
                  <option value="EMAIL">EMAIL</option>
                  <option value="RNM">RNM</option>
                </select>
              </div>
              <div class="form-control">
                <input
                  type="text"
                  name="txtUsuario"
                  id="txtUsuario"
                  class="form-control"
                  maxlength="50"
                  placeholder="Digite seu CPF, RNM ou e-mail"
                  autocomplete="username"
                  title="Alunos do Portal EAD utilizar mesmo login/senha"
                >
                <input type="submit" name="btnavancar" value="Avançar" id="btnavancar" class="button" />
              </div>
            </form>
          </div>
        </div>
      </div>
    </main>
  </section>
</body>
</html>
